<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NSEC Chemistry Prep</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      text-align: center;
      padding: 40px;
    }
    h1 { color: #38bdf8; }
    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }
    input { width: 250px; }
    button {
      background: #38bdf8;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }
    .box {
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      background: #1e293b;
      display: none;
    }
  </style>
</head>

<body>

<h1>🧪 NSEC Chemistry Prep</h1>
<p>Enter a chapter name to start revision</p>

<input type="text" id="chapter" placeholder="e.g. Chemical Bonding">
<br>
<button onclick="showConcepts()">Start Revision</button>

<div id="conceptBox" class="box"></div>
<div id="confirmBox" class="box"></div>
<div id="practiceBox" class="box"></div>

<script>
function showConcepts() {
  const chapter = document.getElementById("chapter").value;
  if (!chapter) return alert("Enter a chapter!");

  const concepts = {
    "Chemical Bonding": [
      "VSEPR Theory",
      "Hybridization",
      "Molecular Orbital Theory",
      "Bond Polarity"
    ],
    "Thermodynamics": [
      "First Law",
      "Enthalpy",
      "Entropy",
      "Gibbs Free Energy"
    ],
    "Equilibrium": [
      "Le Chatelier Principle",
      "Equilibrium Constant",
      "pH & Buffers"
    ]
  };

  let list = concepts[chapter] || ["Key concepts will be updated soon"];

  document.getElementById("conceptBox").style.display = "block";
  document.getElementById("conceptBox").innerHTML =
    "<h2>📚 Important Concepts</h2><ul>" +
    list.map(c => "<li>" + c + "</li>").join("") +
    "</ul>";

  document.getElementById("confirmBox").style.display = "block";
  document.getElementById("confirmBox").innerHTML =
    "<h3>Are you sure you want to move to practice?</h3>" +
    "<button onclick='startPractice()'>Yes</button>" +
    "<button onclick='goBack()'>No</button>";
}

function goBack() {
  document.getElementById("practiceBox").style.display = "none";
  alert("Revise again before practicing!");
}

function startPractice() {
  document.getElementById("practiceBox").style.display = "block";

  const questions = [
    {
      q: "Which hybridization is present in CH4?",
      a: "sp3"
    },
    {
      q: "Which law states energy conservation?",
      a: "First Law of Thermodynamics"
    },
    {
      q: "pH of neutral solution?",
      a: "7"
    }
  ];

  let html = "<h2>⚡ Practice Questions</h2>";

  questions.forEach((item, i) => {
    html += `
      <p><b>Q${i+1}:</b> ${item.q}</p>
      <input type="text" id="ans${i}">
      <button onclick="checkAnswer(${i}, '${item.a}')">Check</button>
      <p id="result${i}"></p>
    `;
  });

  document.getElementById("practiceBox").innerHTML = html;
}

function checkAnswer(i, correct) {
  const userAns = document.getElementById("ans" + i).value.toLowerCase();
  const result = document.getElementById("result" + i);

  if (userAns.includes(correct.toLowerCase())) {
    result.innerHTML = "✅ Correct!";
    result.style.color = "lightgreen";
  } else {
    result.innerHTML = "❌ Incorrect (Ans: " + correct + ")";
    result.style.color = "red";
  }
}
</script>

</body>
</html>
